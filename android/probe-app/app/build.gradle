plugins {
    id "com.android.application"
}

android {
    namespace "com.qpnpu.trial"
    compileSdk 35

    defaultConfig {
        applicationId "com.qpnpu.trial"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
            }
        }

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}